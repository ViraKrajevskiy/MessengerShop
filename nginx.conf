# ─── nginx.conf для 101-school.uz ───
# Положить в /etc/nginx/sites-available/101-school и сделать symlink в sites-enabled

server {
    listen 80;
    server_name 101-school.uz www.101-school.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 101-school.uz www.101-school.uz;

    ssl_certificate     /etc/letsencrypt/live/101-school.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/101-school.uz/privkey.pem;

    # ──────────────── GZIP сжатие ────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ──────────────── Brotli сжатие (если модуль установлен) ────────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ──────────────── Frontend (Vite build) ────────────────
    root /var/www/101-school/frontend/dist;
    index index.html;

    # Файлы с хешем в имени — кешировать навсегда (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Статические файлы (favicon, robots.txt, icons)
    location ~* \.(svg|ico|txt|xml|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # SPA fallback — всё остальное отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
        # index.html НЕ кешируем — чтобы обновления подхватывались
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ──────────────── API Backend (Django) ────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Кешируем GET запросы API на 60 секунд
        proxy_cache_valid 200 60s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ──────────────── Media файлы (Django uploads) ────────────────
    location /media/ {
        alias /var/www/101-school/backend/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";

        # Для картинок — предлагаем WebP если браузер поддерживает
        location ~* \.(jpg|jpeg|png)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header Vary "Accept";
        }
    }

    # ──────────────── Security headers ────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
